apiVersion: batch/v1
kind: CronJob
metadata:
  name: etl-cronjob
  namespace: mern-app
spec:
  schedule: "0 * * * *"        # Every hour, as per README acceptance criteria
  concurrencyPolicy: Forbid    # Don't run a new job if previous one is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: etl-job
        spec:
          restartPolicy: OnFailure
          containers:
            - name: etl
              image: daniyalf42003/python-etl:latest
              imagePullPolicy: Always
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
