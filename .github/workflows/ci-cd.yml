name: CI/CD Pipeline — MERN + Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: daniyalf42003
  BACKEND_IMAGE: daniyalf42003/mern-backend
  FRONTEND_IMAGE: daniyalf42003/mern-frontend
  PYTHON_IMAGE: daniyalf42003/python-etl

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: mern-project/server/package-lock.json

      - name: Install dependencies
        working-directory: mern-project/server
        run: npm ci

      - name: Run tests
        working-directory: mern-project/server
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: Test Frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: mern-project/client/package-lock.json

      - name: Install dependencies
        working-directory: mern-project/client
        run: npm ci

      - name: Run React tests
        working-directory: mern-project/client
        run: npm test -- --watchAll=false --passWithNoTests

  # ─────────────────────────────────────────────
  # JOB 3: Test Python ETL
  # ─────────────────────────────────────────────
  test-python:
    name: Test Python ETL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python-project
        run: pip install -r requirements.txt

      - name: Run Python ETL (smoke test)
        working-directory: python-project
        run: python ETL.py

  # ─────────────────────────────────────────────
  # JOB 4: Build & Push Docker Images
  # Runs only on push to main (not PRs)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./mern-project/server
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./mern-project/client
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}:5050
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Python ETL image
        uses: docker/build-push-action@v5
        with:
          context: ./python-project
          push: true
          tags: |
            ${{ env.PYTHON_IMAGE }}:latest
            ${{ env.PYTHON_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 5: Deploy to EC2 (K3s)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (K3s)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Pull latest manifests
            cd ~/devops-case || git clone https://github.com/DaniyalFarrukh/devops-case.git ~/devops-case
            cd ~/devops-case
            git pull origin main

            # Apply Kubernetes manifests
            kubectl apply -f k8s/mern/namespace.yaml
            kubectl apply -f k8s/mern/mongodb.yaml
            kubectl apply -f k8s/mern/backend.yaml
            kubectl apply -f k8s/mern/frontend.yaml
            kubectl apply -f k8s/python/etl-cronjob.yaml

            # Force rolling restart to pull latest images
            kubectl rollout restart deployment/backend -n mern-app
            kubectl rollout restart deployment/frontend -n mern-app

            # Wait for rollout
            kubectl rollout status deployment/backend -n mern-app --timeout=120s
            kubectl rollout status deployment/frontend -n mern-app --timeout=120s

            echo "Deployment complete!"
            kubectl get pods -n mern-app
